<script>
    const today = new Date();
    const formatter = new Intl.DateTimeFormat('en-US', {
        month: '2-digit',
        day: '2-digit',
        year: 'numeric'
    });
    const formattedDate = formatter.format(today);
    console.log(formattedDate);

    async function getthattotd() {
        const response = await fetch("https://aeryli.github.io/TOTD/totd.json");
        const blob = await response.blob();
        const file = new File([blob], 'totd.json', { type: blob.type });
        console.log(blob);
        console.log(file);
    };
    getthattotd()
      .then(file => console.log('File successfully loaded:', file))
      .catch(err => console.error('Error fetching file:', err));
</script>
